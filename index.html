<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiaming's LLM Hub | 项目枢纽</title>
    <style>
        :root { --main: #00ff9d; --bg: #0a0a0c; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Fira Code', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 12px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--main); font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 10px; }
        .hint { color: #8b949e; font-size: 0.85rem; margin-bottom: 30px; }
        
        .node-list { display: grid; gap: 15px; }
        .node-btn { 
            padding: 16px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: 0.3s;
            border: 1px solid #30363d;
        }
        
        /* 推荐节点：极速秒开 */
        .stable { background: rgba(0, 255, 157, 0.1); color: var(--main); border-color: var(--main); }
        .stable:hover { background: var(--main); color: #000; box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); }
        
        /* 原生节点 */
        .origin { background: transparent; color: #fff; }
        .origin:hover { background: #30363d; }

        .tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="box">
        <h1>PROJECT NODES</h1>
        <p class="hint">当前域名 rjmcode.xyz 已启用全链路加速</p >

        <div class="node-list">
            <a href=" " class="node-btn stable" target="_blank">
                <span>🚀 国内极速节点</span>
                <span class="tag">RECOMMENDED</span>
            </a >

            <a href="https://github.com/Jiaming-Ren/llm-application-roadmap" class="node-btn origin" target="_blank">
                <span>🌐 GitHub 原生节点</span>
                <span class="tag">GLOBAL</span>
            </a >
        </div>

        <div style="margin-top: 30px; font-size: 0.75rem; color: #444;">
            SYSTEM STATUS: <span style="color: var(--main);">HEALTHY</span>
        </div>
    </div>

</body>
</html>
