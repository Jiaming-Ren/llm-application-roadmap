<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiaming's LLM Hub | 稳定版</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-green: #39ff14; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .panel { background: rgba(20, 20, 25, 0.9); border: 1px solid #333; padding: 40px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; }
        h1 { font-size: 1.5rem; letter-spacing: 2px; color: var(--neon-blue); margin-bottom: 30px; }
        .btn-stack { display: grid; gap: 15px; }
        .btn { padding: 15px; border: 1px solid var(--neon-blue); color: var(--neon-blue); text-decoration: none; transition: 0.3s; cursor: pointer; background: transparent; font-weight: bold; }
        .btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        .btn.gitee { border-color: var(--neon-green); color: var(--neon-green); }
        .btn.gitee:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }
        .copy-hint { margin-top: 20px; font-size: 0.8rem; color: #666; cursor: pointer; }
    </style>
</head>
<body>

    <div class="panel">
        <h1>PROJECT CONTROL CENTER</h1>
        
        <div class="btn-stack">
            <a href=" " class="btn" target="_blank">
                [ 节点 A ] GitHub 官方库
            </a >

            <a href="https://gitee.com/Jiaming-Ren/llm-application-roadmap" class="btn gitee" target="_blank">
                [ 节点 B ] Gitee 国内加速 (推荐)
            </a >

            <button class="btn" style="border-color: #fff; color: #fff;" onclick="copyLink()">
                [ 节点 C ] 复制仓库地址 (兜底)
            </button>
        </div>

        <div class="copy-hint" id="statusText">系统状态: 待命...</div>
    </div>

    <script>
        function copyLink() {
            const link = 'https://github.com/Jiaming-Ren/llm-application-roadmap';
            navigator.clipboard.writeText(link).then(() => {
                const status = document.getElementById('statusText');
                status.innerText = '✅ 地址已成功复制到剪贴板！';
                status.style.color = '#39ff14';
                setTimeout(() => {
                    status.innerText = '系统状态: 待命...';
                    status.style.color = '#666';
                }, 2000);
            });
        }
    </script>
</body>
</html>
